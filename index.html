<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarceloLinks - Links Oficiais</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00b894;
            --bg-gradient: linear-gradient(135deg, #e0f2f1 0%, #ffffff 100%);
            --text-color: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            padding: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        p {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .links-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .link-card:hover {
            transform: translateY(-3px);
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .link-card i {
            font-size: 1.4rem;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        /* Cores específicas para ícones */
        .fa-whatsapp { color: #25D366; }
        .fa-telegram { color: #0088cc; }
        .fa-shopping-cart { color: var(--primary-color); }

        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/100" alt="Logo PromoZone" class="profile-img">
        
        <h1>@promozone</h1>
        <p>Tenha acesso as melhores Ofertas e Promoções do Brasil!</p>

        <div class="links-area">
            
            <a href="SEU_LINK_AQUI" class="link-card" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>Grupo no WhatsApp</span>
            </a>

            <a href="SEU_LINK_AQUI" class="link-card" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>Canal no WhatsApp</span>
            </a>

            <a href="SEU_LINK_AQUI" class="link-card" target="_blank">
                <i class="fab fa-telegram"></i>
                <span>Grupo no Telegram</span>
            </a>

            <a href="SEU_LINK_AQUI" class="link-card" target="_blank">
                <i class="fas fa-shopping-cart"></i>
                <span>Rifle Jade Mais Nitro 5.5</span>
            </a>

            <a href="SEU_LINK_AQUI" class="link-card" target="_blank">
                <i class="fas fa-shopping-cart"></i>
                <span>Mochila God Talent 40L</span>
            </a>

        </div>
    </div>

    <div class="footer">
        © 2026 PromoZone • Desenvolvido com Gemini
